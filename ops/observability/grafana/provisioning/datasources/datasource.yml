# Auto-provision the Prometheus datasource so Grafana boots ready-to-use
# (no click-through setup). Referenced by dashboards via uid "eventsense-prom".
apiVersion: 1

datasources:
  - name: Prometheus
    uid: eventsense-prom
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    uid: eventsense-pg
    type: postgres
    access: proxy
    url: postgres:5432
    database: eventsense
    user: eventsense
    secureJsonData:
      password: eventsense
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: false
    editable: false

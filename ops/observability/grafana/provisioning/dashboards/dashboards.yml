# Tell Grafana to load dashboard JSON from disk on boot, so the EventSense
# Overview dashboard is present the moment the container starts.
apiVersion: 1

providers:
  - name: EventSense
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

# Local dev stack: PostgreSQL + Redis + FastAPI with hot reload.
# Production stack will live in docker-compose.prod.yml (Milestone 9+).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventsense
      POSTGRES_PASSWORD: eventsense
      POSTGRES_DB: eventsense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventsense"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Load secrets / API keys from backend/.env (FRED_API_KEY etc).
    env_file:
      - ./backend/.env
    # These override .env values — inside the compose network, postgres/redis are
    # hostnames (not localhost as .env assumes for local dev).
    environment:
      DATABASE_URL: postgresql+asyncpg://eventsense:eventsense@postgres:5432/eventsense
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot reload — uvicorn --reload watches these paths.
      # The .venv lives inside the container only (anonymous volume blocks host overlay).
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # On startup: apply latest migrations, then run with hot reload.
    # alembic/uvicorn come from /app/.venv/bin which is on PATH (set in Dockerfile).
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://eventsense:eventsense@postgres:5432/eventsense
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Don't start worker until backend has run migrations (backend has the alembic step).
      backend:
        condition: service_started
    # Listens to fetch_queue + validate_queue. Both are IO-bound (HTTP / DB),
    # safe to share concurrency budget. analyze_queue stays isolated on its
    # own worker so slow LLM calls don't starve quick fetchers/validators.
    # -E sends task-lifecycle events to the broker so celery-exporter (M11) can
    # scrape per-task throughput / failures / runtime.
    command: celery -A app.workers.celery_app worker --loglevel=info -E -Q fetch_queue,validate_queue --concurrency=4

  analyzer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://eventsense:eventsense@postgres:5432/eventsense
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    # Dedicated worker on analyze_queue. Concurrency=2 — LLM APIs have per-org
    # rate limits, and concurrent calls also burn budget faster than we'd like.
    command: celery -A app.workers.celery_app worker --loglevel=info -E -Q analyze_queue --concurrency=2

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://eventsense:eventsense@postgres:5432/eventsense
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      redis:
        condition: service_healthy
    # Beat must run as a single replica — two beats would double-enqueue every schedule.
    command: celery -A app.workers.celery_app beat --loglevel=info

  # --- Observability stack (Milestone 11) -----------------------------------
  # Opt-in via profile so a plain `docker compose up` stays lean. Bring up with:
  #   docker compose --profile observability up -d
  # Then: Prometheus → http://localhost:9090, Grafana → http://localhost:3001
  # (admin/admin). The EventSense Overview dashboard is auto-provisioned.

  celery-exporter:
    image: danihodovic/celery-exporter:0.12.2
    profiles: ["observability"]
    environment:
      # Listen to the same broker the workers emit task events on.
      CE_BROKER_URL: redis://redis:6379/0
    ports:
      - "9808:9808"
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["observability"]
    volumes:
      - ./ops/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.3.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Dashboards live in source control; users edit copies, not the originals.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./ops/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    # 3001 on the host — 3000 is taken by the Next.js frontend in local dev.
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

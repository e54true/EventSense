# Frontend CI — Next.js build is the typecheck + bundle check in one step.
# We don't run unit tests yet (no Vitest setup); add when M10's stateful UI
# (auth, watchlist) gives us logic worth unit-testing.

name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (locked)
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Production build (includes TS typecheck)
        env:
          # Build doesn't actually hit the API — this is just so NEXT_PUBLIC_API_URL
          # is defined at build time.
          NEXT_PUBLIC_API_URL: http://placeholder.local
        run: npm run build
